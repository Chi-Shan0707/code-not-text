<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L9,5 L0,9z" fill="#64748b"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" rx="16" fill="#fafbfc"/>
  <rect x="1" y="1" width="998" height="518" rx="16" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">SVD Pipeline: From Raw Features to Prediction Score</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#94a3b8">StandardScaler → TruncatedSVD → LogisticRegression</text>

  <!-- ===================== STEP 1: Matrix Sources ===================== -->
  <rect x="20" y="80" width="280" height="200" rx="12" fill="#fff" stroke="#dbeafe" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="32" y="88" width="90" height="24" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="77" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#3b82f6">1. INPUT</text>

  <text x="36" y="130" font-size="14" font-weight="700" fill="#1e293b">Collect per-run features</text>
  <text x="36" y="148" font-size="11" fill="#64748b">Each row = one run; each col = one feature</text>

  <!-- X_raw matrix -->
  <rect x="36" y="162" width="110" height="56" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="91" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#3b82f6">X_raw</text>
  <text x="91" y="196" text-anchor="middle" font-size="10" fill="#64748b">(n x 25 raw)</text>
  <rect x="42" y="204" width="14" height="8" rx="2" fill="#93c5fd" opacity=".7"/>
  <rect x="59" y="204" width="14" height="8" rx="2" fill="#93c5fd" opacity=".4"/>
  <rect x="76" y="204" width="14" height="8" rx="2" fill="#93c5fd" opacity=".7"/>
  <rect x="93" y="204" width="14" height="8" rx="2" fill="#e2e8f0" opacity=".5"/>

  <!-- plus sign -->
  <text x="160" y="196" text-anchor="middle" font-size="20" font-weight="700" fill="#94a3b8">+</text>

  <!-- X_rank matrix -->
  <rect x="174" y="162" width="110" height="56" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="229" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">X_rank</text>
  <text x="229" y="196" text-anchor="middle" font-size="10" fill="#64748b">(n x 25 rank)</text>
  <rect x="180" y="204" width="14" height="8" rx="2" fill="#6ee7b7" opacity=".7"/>
  <rect x="197" y="204" width="14" height="8" rx="2" fill="#6ee7b7" opacity=".4"/>
  <rect x="214" y="204" width="14" height="8" rx="2" fill="#6ee7b7" opacity=".7"/>
  <rect x="231" y="204" width="14" height="8" rx="2" fill="#e2e8f0" opacity=".5"/>

  <text x="160" y="240" text-anchor="middle" font-size="10" fill="#94a3b8">rank = normalized position within problem</text>
  <text x="160" y="254" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">X_rep = [X_raw, X_rank]  (n x 50)</text>

  <!-- Arrow 1→2 -->
  <line x1="305" y1="180" x2="345" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== STEP 2: StandardScaler ===================== -->
  <rect x="350" y="80" width="180" height="200" rx="12" fill="#fff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="362" y="88" width="80" height="24" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="402" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#3b82f6">2. SCALE</text>

  <text x="366" y="130" font-size="15" font-weight="700" fill="#1e293b">Standard-</text>
  <text x="366" y="150" font-size="15" font-weight="700" fill="#1e293b">Scaler</text>
  <text x="366" y="170" font-size="11" fill="#64748b">Per-column z-score:</text>
  <text x="366" y="186" font-size="12" font-weight="600" fill="#3b82f6">(X - mean) / std</text>

  <text x="366" y="212" font-size="10" fill="#94a3b8">Equalizes feature scales so</text>
  <text x="366" y="226" font-size="10" fill="#94a3b8">large-range features don't</text>
  <text x="366" y="240" font-size="10" fill="#94a3b8">dominate SVD directions</text>

  <!-- X_scaled -->
  <rect x="370" y="250" width="120" height="22" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="430" y="265" text-anchor="middle" font-size="11" font-weight="600" fill="#3b82f6">X_scaled (n x 50)</text>

  <!-- Arrow 2→3 -->
  <line x1="535" y1="180" x2="575" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== STEP 3: TruncatedSVD ===================== -->
  <rect x="580" y="80" width="200" height="200" rx="12" fill="#fff" stroke="#fed7aa" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="592" y="88" width="96" height="24" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="640" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#ea580c">3. TRUNCATE</text>

  <text x="596" y="130" font-size="14" font-weight="700" fill="#1e293b">TruncatedSVD</text>
  <text x="596" y="150" font-size="11" fill="#64748b">X_scaled = U * Sigma * V^T</text>
  <text x="596" y="170" font-size="12" font-weight="600" fill="#ea580c">Keep top r components</text>

  <!-- Singular value bars -->
  <line x1="596" y1="192" x2="762" y2="192" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="600" y="170" width="14" height="22" rx="3" fill="#f97316"/>
  <text x="607" y="206" text-anchor="middle" font-size="9" fill="#94a3b8">1</text>
  <rect x="618" y="176" width="14" height="16" rx="3" fill="#f97316"/>
  <rect x="636" y="180" width="14" height="12" rx="3" fill="#f97316"/>
  <rect x="654" y="183" width="14" height="9" rx="3" fill="#f97316"/>
  <rect x="672" y="186" width="14" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="690" y="188" width="14" height="4" rx="3" fill="#e2e8f0"/>
  <rect x="708" y="189" width="14" height="3" rx="3" fill="#e2e8f0"/>
  <text x="660" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#ea580c">keep first r | discard rest</text>

  <text x="596" y="245" font-size="10" fill="#94a3b8">Project to low-dim:</text>
  <text x="596" y="260" font-size="12" font-weight="600" fill="#ea580c">Z = X_scaled * V_r   (n x r)</text>

  <!-- Arrow 3→4 -->
  <line x1="785" y1="180" x2="825" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== STEP 4: LogisticRegression ===================== -->
  <rect x="830" y="80" width="150" height="200" rx="12" fill="#fff" stroke="#fecaca" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="842" y="88" width="80" height="24" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="882" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">4. PREDICT</text>

  <text x="846" y="130" font-size="13" font-weight="700" fill="#1e293b">Logistic</text>
  <text x="846" y="148" font-size="13" font-weight="700" fill="#1e293b">Regression</text>
  <text x="846" y="170" font-size="11" fill="#64748b">Linear decision in</text>
  <text x="846" y="184" font-size="11" fill="#64748b">low-dimensional space:</text>

  <text x="846" y="208" font-size="13" font-weight="700" fill="#dc2626">score = w^T z + b</text>
  <text x="846" y="230" font-size="12" fill="#64748b">p = sigmoid(score)</text>

  <rect x="852" y="246" width="100" height="24" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="902" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">P(correct) in [0,1]</text>

  <!-- ===================== Bottom: Interpretability note ===================== -->
  <rect x="20" y="300" width="960" height="100" rx="12" fill="#fff" stroke="#ede9fe" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="32" y="308" width="140" height="24" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="102" y="325" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">5. INTERPRETABILITY</text>

  <text x="36" y="352" font-size="13" font-weight="600" fill="#1e293b">Project classifier weights back to original features:</text>
  <text x="36" y="374" font-size="13" fill="#64748b">
    <tspan font-weight="600" fill="#7c3aed">w_original = V_r^T * beta</tspan>
    <tspan dx="12" fill="#94a3b8">maps LR coefficients through SVD to see which raw features matter</tspan>
  </text>
  <text x="36" y="392" font-size="11" fill="#94a3b8">This makes the model interpretable: inspect which features drive each prediction, even after dimensionality reduction.</text>

  <!-- ===================== Bottom: Key dimensions ===================== -->
  <rect x="20" y="416" width="960" height="44" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="36" y="443" font-size="12" fill="#64748b">
    <tspan font-weight="600" fill="#1e293b">Route 9 dimensions:</tspan>
    <tspan dx="8">30 raw features</tspan>
    <tspan dx="4" fill="#94a3b8">→</tspan>
    <tspan dx="4">22 selected (drop META/LOCAL)</tspan>
    <tspan dx="4" fill="#94a3b8">→</tspan>
    <tspan dx="4">44 raw+rank representation</tspan>
    <tspan dx="4" fill="#94a3b8">→</tspan>
    <tspan dx="4" font-weight="600" fill="#ea580c">16 SVD components</tspan>
    <tspan dx="4" fill="#94a3b8">→</tspan>
    <tspan dx="4">1 logit score</tspan>
  </text>

  <!-- ===================== Legend ===================== -->
  <g transform="translate(20, 476)">
    <rect width="960" height="28" rx="8" fill="#f1f5f9"/>
    <rect x="16" y="8" width="14" height="12" rx="3" fill="#3b82f6" opacity=".6"/>
    <text x="36" y="18" font-size="11" fill="#64748b">Raw values</text>
    <rect x="116" y="8" width="14" height="12" rx="3" fill="#059669" opacity=".6"/>
    <text x="136" y="18" font-size="11" fill="#64748b">Rank values</text>
    <rect x="226" y="8" width="14" height="12" rx="3" fill="#f97316" opacity=".6"/>
    <text x="246" y="18" font-size="11" fill="#64748b">SVD / kept</text>
    <rect x="326" y="8" width="14" height="12" rx="3" fill="#e2e8f0"/>
    <text x="346" y="18" font-size="11" fill="#64748b">Discarded</text>
    <rect x="426" y="8" width="14" height="12" rx="3" fill="#dc2626" opacity=".6"/>
    <text x="446" y="18" font-size="11" fill="#64748b">Classification</text>
    <rect x="546" y="8" width="14" height="12" rx="3" fill="#7c3aed" opacity=".6"/>
    <text x="566" y="18" font-size="11" fill="#64748b">Interpretability</text>
  </g>
</svg>
